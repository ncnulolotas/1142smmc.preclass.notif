      { id: 4, weekId: 3, type: 'alert', content: { zh: '強烈建議大家先去註冊 104 人力銀行與 LinkedIn 帳號！', en: 'Strongly recommend registering for 104 Job Bank and LinkedIn accounts ASAP!' }, author: 'Prof. Lo', timestamp: '2026-03-10 09:00', color: 'bg-green-200', rotation: 'rotate-2' },
      { id: 5, weekId: 4, type: 'alert', content: { zh: '下周有邀請2位學姊到課堂分享', en: 'We have invited 2 alumnae to share their experiences in class next week.' }, author: 'TA (Tina Wang)', timestamp: '2026-03-17 14:00', color: 'bg-red-200', rotation: '-rotate-1' },
      
      { id: 6, weekId: 5, type: 'homework', content: { zh: '請同學預習 W6 課程內容，下週課堂使用。', en: 'Please preview the materials for W6, which will be used in class next week.' }, author: 'TA (Tina)', timestamp: '2026-03-24 10:00', color: 'bg-purple-200', rotation: 'rotate-1' },
      { id: 61, weekId: 5, type: 'info', content: { zh: 'W5 課前任務', en: 'W5 Pre-class Task' }, previewUrl: 'https://ncnulolotas.github.io/1142smmc.preclass.notif/W5.1', author: 'Prof. Lo', timestamp: '2026-03-24 10:30', color: 'bg-yellow-200', rotation: '-rotate-1' },
      
      { id: 7, weekId: 6, type: 'homework', content: { zh: '可以上傳 W4-W6 SPA 自學 CSV 檔案到 W7 作為 BA 加分作業 期限4/5午夜', en: 'You can upload the W4-W6 SPA self-study CSV file to W7 for BA bonus. Deadline: 4/5 Midnight.' }, author: 'Prof. Lo', timestamp: '2026-03-31 09:00', color: 'bg-yellow-200', rotation: '-rotate-1' },
      { id: 8, weekId: 6, type: 'homework', content: { zh: 'TP0 SPA請根據Moodle要求製作，繳交至 W7 期限4/5午夜', en: 'Submit [TP0] SPA to W7 according to Moodle rules. Deadline: 4/5 Midnight.' }, author: 'TA (Tina Lin)', timestamp: '2026-03-31 10:30', color: 'bg-blue-200', rotation: 'rotate-2' },
      { id: 9, weekId: 6, type: 'alert', content: { zh: '下周一 (4/6) 適逢清明連假，放假一次！', en: 'Next Monday (April 6th) is off for Tomb-Sweeping Day!' }, author: 'Prof. Lo', timestamp: '2026-03-31 13:00', color: 'bg-red-200', rotation: '-rotate-2' },
    ];

    const NOTE_COLORS = ['bg-yellow-200', 'bg-pink-200', 'bg-blue-200', 'bg-green-200', 'bg-purple-200'];
    const NOTE_ROTATIONS = ['-rotate-2', '-rotate-1', 'rotate-0', 'rotate-1', 'rotate-2'];

    // 圖示元件
    const IconCalendar = () => <i className="fas fa-calendar-alt text-2xl"></i>;
    const IconMessage = ({size=16, className=""}) => <i className={`fas fa-comment-alt ${className}`} style={{fontSize: size}}></i>;
    const IconPlus = () => <i className="fas fa-plus"></i>;
    const IconX = () => <i className="fas fa-times"></i>;
    const IconPin = () => <i className="fas fa-thumbtack text-red-500 drop-shadow-sm" style={{fontSize: '24px'}}></i>;
    const IconTrash = () => <i className="fas fa-trash"></i>;
    const IconBook = ({className=""}) => <i className={`fas fa-book ${className}`}></i>;
    const IconClock = () => <i className="fas fa-clock"></i>;
    const IconAlert = () => <i className="fas fa-exclamation-circle text-red-500 text-3xl"></i>;
    const IconLink = () => <i className="fas fa-external-link-alt text-[10px]"></i>;
    const IconChevronUp = () => <i className="fas fa-chevron-up"></i>;
    const IconChevronDown = () => <i className="fas fa-chevron-down"></i>;
    const IconMenu = () => <i className="fas fa-bars"></i>;
    const IconHistory = () => <i className="fas fa-history"></i>;

    const App = () => {
      const [lang, setLang] = useState('zh');
      const t = translations[lang];

      const currentWeekId = initialWeeks.find(w => w.tags.includes('now'))?.id || 1;
      const [activeWeek, setActiveWeek] = useState(currentWeekId);
      const [isArchiveOpen, setIsArchiveOpen] = useState(false);
      
      const [notes, setNotes] = useState(initialNotes);
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [showSyllabus, setShowSyllabus] = useState(true);
      const [noteToDelete, setNoteToDelete] = useState(null);
      const scrollContainerRef = useRef(null);

      const pastWeeks = initialWeeks.filter(w => w.id < currentWeekId);
      const upcomingWeeks = initialWeeks.filter(w => w.id >= currentWeekId);

      const [newNote, setNewNote] = useState({ type: 'info', content: '', author: 'Prof. Lo' });

      // 定義圖示對應 (避免在組件外渲染)
      const noteTypeIcons = {
        'info': <IconMessage />,
        'homework': <IconBook />,
        'material': <IconClock />,
        'alert': <i className="fas fa-exclamation-circle"></i>
      };

      useEffect(() => {
        const activeElement = document.getElementById(`week-tab-${activeWeek}`);
        if (activeElement && scrollContainerRef.current) {
          activeElement.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
      }, [activeWeek]);

      const activeWeekData = initialWeeks.find(w => w.id === activeWeek);
      const currentWeekNotes = notes.filter(n => n.weekId === activeWeek);

      const handleAddNote = (e) => {
        e.preventDefault();
        if (!newNote.content.trim()) return;
        const now = new Date();
        const timestamp = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        const noteToAdd = {
          id: Date.now(),
          weekId: activeWeek,
          ...newNote,
          content: { zh: newNote.content, en: newNote.content },
          timestamp,
          color: NOTE_COLORS[Math.floor(Math.random() * NOTE_COLORS.length)],
          rotation: NOTE_ROTATIONS[Math.floor(Math.random() * NOTE_ROTATIONS.length)]
        };
        setNotes([...notes, noteToAdd]);
        setIsModalOpen(false);
        setNewNote({ type: 'info', content: '', author: 'Prof. Lo' });
      };

      const handleDeleteNote = (id) => setNoteToDelete(id);
      const confirmDelete = () => {
        setNotes(notes.filter(n => n.id !== noteToDelete));
        setNoteToDelete(null);
      };

      const getText = (obj) => typeof obj === 'string' ? obj : (obj[lang] || obj.zh || '');

      const renderTag = (tag, idx) => {
        const tagStyles = {
          tp: "border-yellow-400 bg-yellow-50 text-yellow-700",
          ent: "border-blue-400 bg-blue-50 text-blue-700",
          cs: "border-green-400 bg-green-50 text-green-700",
          peer: "border-red-400 bg-red-50 text-red-700",
          sdl: "border-purple-400 bg-purple-50 text-purple-700",
          now: "bg-green-500 text-white border-green-500"
        };
        const labels = { tp: "Term Project", ent: "ENT", cs: "CS", peer: "Peer Review", sdl: "SDL", now: t.tagNow };
        if (!tagStyles[tag]) return null;
        return <span key={idx} className={`text-[10px] font-mono px-2 py-0.5 rounded border whitespace-nowrap ml-2 ${tagStyles[tag]}`}>{labels[tag]}</span>;
      };

      const renderNoteContentWithLinks = (contentStr) => {
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        const parts = contentStr.split(urlRegex);
        
        return parts.map((part, i) => {
          if (part.match(urlRegex)) {
            return (
              <a key={i} href={part} target="_blank" rel="noreferrer" className="text-blue-600 hover:text-blue-800 underline break-all inline-flex items-center gap-1">
                {part} <IconLink />
              </a>
            );
          }
          return <span key={i}>{part}</span>;
        });
      };

      return (
        <React.Fragment>
          {/* 頂部導覽列 */}
          <header className="bg-white shadow-sm border-b border-slate-200 py-3 px-4 md:px-6 sticky top-0 z-40">
            <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
              <div className="flex items-center gap-3 w-full md:w-auto">
                <div className="bg-slate-900 p-2 rounded-lg text-green-400 shadow-md flex items-center justify-center">
                  <span className="font-bold font-mono text-lg leading-none">SMMC</span>
                </div>
                <div>
                  <h1 className="text-xl md:text-2xl font-bold tracking-tight">{t.courseName}</h1>
                  <div className="flex items-center gap-2 mt-1 flex-wrap text-xs text-slate-500">
                    <span className="font-mono bg-slate-100 border px-2 py-0.5 rounded">1142 · Spring 2026</span>
                    <span>{t.teacher}</span>
                  </div>
                </div>
              </div>
              <div className="flex items-center gap-3 w-full md:w-auto justify-end">
                 <button onClick={() => setLang(lang === 'zh' ? 'en' : 'zh')} className="text-slate-500 hover:text-slate-800 p-2 text-sm font-mono border border-slate-200 rounded transition-colors bg-white hover:bg-slate-50 flex items-center gap-1">
                    <i className="fas fa-language"></i> {t.langBtn}
                 </button>
                <button onClick={() => setIsModalOpen(true)} className="flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-md font-medium transition-all shadow-sm text-sm whitespace-nowrap">
                  <IconPlus /> {t.addNoticeBtn}
                </button>
              </div>
            </div>
          </header>

          {/* 週次選擇器 (漢堡複習選單) */}
          <div className="bg-white/90 backdrop-blur-md border-b border-slate-200 sticky top-[95px] md:top-[76px] z-30 shadow-sm">
            <div className="max-w-7xl mx-auto px-2 py-2 flex items-center gap-2">
              <div className="relative">
                <button 
                  onClick={() => setIsArchiveOpen(!isArchiveOpen)}
                  className={`flex-shrink-0 p-3 rounded-lg border transition-all flex items-center gap-2 
                    ${isArchiveOpen ? 'bg-slate-800 text-white border-slate-800' : 'bg-slate-100 text-slate-600 border-transparent hover:bg-slate-200'}`}
                >
                  <IconMenu />
                  <span className="text-xs font-bold hidden sm:inline">{t.archiveBtn}</span>
                </button>
                {isArchiveOpen && (
                  <div className="absolute top-full left-0 mt-2 w-64 bg-white shadow-2xl rounded-xl border border-slate-200 overflow-hidden z-50">
                    <div className="bg-slate-50 p-3 border-b flex justify-between items-center text-xs font-bold text-slate-500">
                      <span className="flex items-center gap-1"><IconHistory /> HISTORY</span>
                      <button onClick={() => setIsArchiveOpen(false)}><IconX /></button>
                    </div>
                    <div className="max-h-80 overflow-y-auto">
                      {pastWeeks.map(week => (
                        <button key={week.id} onClick={() => { setActiveWeek(week.id); setIsArchiveOpen(false); }} className={`w-full text-left p-3 hover:bg-blue-50 border-b border-slate-100 ${activeWeek === week.id ? 'bg-blue-50' : ''}`}>
                          <span className="text-[10px] font-mono text-slate-400">{week.date}</span>
                          <div className="text-sm font-bold text-slate-700">W{week.id} {getText(week.topic)}</div>
                        </button>
                      ))}
                    </div>
                  </div>
                )}
              </div>
              <div className="w-px h-8 bg-slate-200 mx-1"></div>
              <div ref={scrollContainerRef} className="flex overflow-x-auto hide-scrollbar gap-2 pb-2 pt-1 px-1 snap-x scroll-smooth flex-1">
                {upcomingWeeks.map((week) => (
                  <button key={week.id} id={`week-tab-${week.id}`} onClick={() => setActiveWeek(week.id)} className={`flex-shrink-0 snap-center rounded-lg px-4 py-2 text-left transition-all border ${activeWeek === week.id ? 'border-green-500 bg-green-50 shadow-sm ring-1 ring-green-500' : week.id === currentWeekId ? 'border-slate-300 bg-white hover:border-green-400' : 'border-transparent bg-slate-50 hover:bg-slate-100 hover:border-slate-300 text-slate-600'}`}>
                    <div className="flex items-center justify-between gap-2 mb-1">
                      <div className={`text-xs font-mono font-bold ${activeWeek === week.id || week.id === currentWeekId ? 'text-green-600' : 'text-slate-400'}`}>{week.id === 17 ? 'W17-18' : `W${week.id}`}</div>
                      <div className="flex gap-1">{week.tags.includes('now') && <div className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>}{week.tags.includes('tp') && <div className="w-1.5 h-1.5 rounded-full bg-yellow-400"></div>}{week.tags.includes('ent') && <div className="w-1.5 h-1.5 rounded-full bg-blue-400"></div>}</div>
                    </div>
                    <div className="text-sm font-semibold truncate w-32 md:w-40 text-slate-800">{getText(week.topic)}</div>
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* 主要內容區 */}
          <main className="flex-1 max-w-7xl mx-auto w-full px-4 md:px-6 py-6 relative flex flex-col lg:flex-row gap-8 items-start">
            <div className="absolute inset-0 opacity-[0.02] pointer-events-none" style={{ backgroundImage: 'radial-gradient(circle at 2px 2px, black 1px, transparent 0)', backgroundSize: '24px 24px' }}></div>
            
            {/* 左側：課綱 Syllabus */}
            <div className="w-full lg:w-1/3 flex flex-col gap-4 relative z-10 lg:sticky lg:top-[160px]">
              <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                <div className="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-center cursor-pointer hover:bg-slate-100" onClick={() => setShowSyllabus(!showSyllabus)}>
                  <div>
                    <h3 className="font-mono text-xs text-slate-500 mb-1 tracking-wider uppercase">{t.syllabusTitle}</h3>
                    <div className="font-bold text-lg flex items-center flex-wrap gap-y-1">{activeWeekData.id === 17 ? 'W17-18' : getText(activeWeekData.title)}{activeWeekData.tags.map((tag, idx) => renderTag(tag, idx))}</div>
                  </div>
                  {showSyllabus ? <IconChevronUp /> : <IconChevronDown />}
                </div>
                {showSyllabus && (
                  <div className="p-5 max-h-[50vh] lg:max-h-[65vh] overflow-y-auto">
                    <h4 className="font-bold text-slate-800 mb-4 pb-2 border-b border-slate-100 flex items-start gap-2 leading-snug"><IconBook className="text-green-600 mt-1" /><span>{getText(activeWeekData.topic)}</span></h4>
                    {activeWeekData.details && activeWeekData.details.length > 0 ? (
                      <ul className="space-y-4">
                        {activeWeekData.details.map((detail) => (
                          <li key={detail.id} className="flex items-start gap-3 text-sm">
                            <div className="w-1.5 h-1.5 rounded-full bg-green-500 flex-shrink-0 mt-1.5"></div>
                            <div className="flex-1">
                              <span className="text-slate-800 leading-relaxed">{getText(detail.text)}</span>
                              {detail.note && getText(detail.note) && <span className="ml-2 inline-block font-mono text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded border border-slate-200">{getText(detail.note)}</span>}
                              {detail.links && <div className="mt-1 flex flex-wrap gap-2">{detail.links.map((link, lidx) => (<a key={lidx} href={link.url} target="_blank" className="inline-flex items-center gap-1 font-mono text-[11px] text-green-600 hover:underline">{link.label} <IconLink /></a>))}</div>}
                              {detail.subtopics && <ul className="mt-1.5 pl-3 border-l-2 border-slate-100 space-y-1">{detail.subtopics.map((sub, sidx) => (<li key={sidx} className="text-slate-500 text-[13px] flex items-start gap-2"><span className="text-slate-300 mt-0.5">—</span>{getText(sub)}</li>))}</ul>}
                            </div>
                          </li>
                        ))}
                      </ul>
                    ) : <div className="text-center py-6 text-slate-400 text-xs font-mono uppercase"><p>{t.contentLocked}</p></div>}
                  </div>
                )}
              </div>
            </div>

            {/* 右側：便利貼佈告欄 */}
            <div className="w-full lg:w-2/3 relative z-10">
              <h2 className="text-xl md:text-2xl font-bold text-slate-800 flex items-center gap-2 mb-6"><IconMessage size="24px" className="text-blue-500" />{t.boardTitle}</h2>
              {currentWeekNotes.length === 0 ? (
                <div className="flex flex-col items-center justify-center py-20 text-slate-400 bg-white/50 rounded-2xl border-2 border-dashed border-slate-200"><IconMessage size="48px" className="mb-4 opacity-30" /><p className="text-lg">{t.emptyBoardTitle}</p></div>
              ) : (
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 items-start pb-10">
                  {currentWeekNotes.map((note) => (
                    <div key={note.id} className={`${note.color} ${note.rotation} group relative rounded-sm p-5 shadow-sm hover:shadow-xl transition-all duration-300 hover:-translate-y-1 hover:rotate-0`} style={{ boxShadow: '3px 4px 10px rgba(0,0,0,0.08)', borderBottomRightRadius: '20px 20px' }}>
                      <div className="absolute -top-3 left-1/2 -translate-x-1/2 z-10"><IconPin /></div>
                      <button onClick={() => handleDeleteNote(note.id)} className="absolute top-3 right-3 opacity-0 group-hover:opacity-100 text-slate-600 hover:text-red-600 p-1.5 rounded-full bg-white/50 transition-opacity"><IconTrash /></button>
                      <div className="flex items-center gap-1 text-xs font-semibold uppercase tracking-wider text-black/40 mb-3 mt-2">
                        {noteTypeIcons[note.type]}
                        <span>{t['type' + note.type.charAt(0).toUpperCase() + note.type.slice(1)]}</span>
                      </div>
                      
                      <p className="text-slate-800 text-base leading-relaxed whitespace-pre-wrap font-medium min-h-[40px]">
                        {renderNoteContentWithLinks(getText(note.content))}
                      </p>

                      {/* 網頁預覽 Iframe 區塊 */}
                      {note.previewUrl && (
                        <div className="mt-3 w-full h-48 border border-black/10 rounded-md overflow-hidden relative shadow-inner bg-slate-50">
                          <iframe 
                            src={note.previewUrl} 
                            className="w-full h-full border-0 pointer-events-auto"
                            title="Webpage Preview"
                          />
                          <a 
                            href={note.previewUrl} 
                            target="_blank" 
                            rel="noreferrer" 
                            className="absolute bottom-2 right-2 bg-slate-800/80 text-white p-1.5 rounded-full hover:bg-slate-900 transition-colors shadow-sm backdrop-blur-sm"
                            title="Open in new tab"
                          >
                            <IconLink />
                          </a>
                        </div>
                      )}

                      <div className="mt-4 pt-3 border-t border-black/10 flex justify-between items-center text-xs text-black/50"><span className="font-bold flex items-center gap-1"><div className="w-4 h-4 rounded-full bg-black/10 flex items-center justify-center text-[8px]">{getText(note.author).charAt(0)}</div>{getText(note.author)}</span><span className="font-mono text-[10px]">{note.timestamp.split(' ')[0]}</span></div>
                      <div className="note-shadow-corner"></div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </main>

          {/* 新增 Modal */}
          {isModalOpen && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden p-6 animate-fade-in">
                <h3 className="text-lg font-bold mb-4 flex items-center gap-2"><IconMessage className="text-blue-500" />{t.modalAddTitle.replace('{week}', activeWeek)}</h3>
                <form onSubmit={handleAddNote} className="space-y-4">
                  <div><label className="block text-sm font-semibold mb-1">{t.noteTypeLabel}</label>
                    <div className="grid grid-cols-2 gap-2">
                      {['info', 'homework', 'material', 'alert'].map(type => (
                        <button key={type} type="button" onClick={() => setNewNote({...newNote, type})} className={`flex items-center justify-center gap-2 py-2 rounded-lg border text-xs transition-all ${newNote.type === type ? 'bg-blue-50 border-blue-500 text-blue-700 ring-1' : 'bg-white'}`}>
                          {noteTypeIcons[type]} {t['type' + type.charAt(0).toUpperCase() + type.slice(1)]}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div><label className="block text-sm font-semibold mb-1">{t.contentLabel}</label>
                    <textarea required value={newNote.content} onChange={(e) => setNewNote({...newNote, content: e.target.value})} className="w-full border rounded-lg p-3 min-h-[120px] text-sm bg-slate-50 focus:bg-white transition-colors outline-none focus:ring-2 focus:ring-blue-500" placeholder={t.contentPlaceholder}></textarea>
                  </div>
                  <div className="flex gap-3 pt-4"><button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 border py-2.5 rounded-xl text-sm font-medium">{t.cancelBtn}</button><button type="submit" className="flex-1 bg-slate-900 text-white py-2.5 rounded-xl text-sm font-medium hover:bg-slate-800">{t.submitBtn}</button></div>
                </form>
              </div>
            </div>
          )}

          {/* 刪除確認 Modal */}
          {noteToDelete !== null && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 animate-fade-in text-center text-sm">
                <div className="mb-3 flex justify-center"><IconAlert /></div>
                <h3 className="text-xl font-bold mb-2">{t.confirmDelTitle}</h3>
                <p className="text-slate-500 mb-6">{t.confirmDelDesc}</p>
                <div className="flex gap-3"><button onClick={() => setNoteToDelete(null)} className="flex-1 border py-2.5 rounded-xl">{t.cancelBtn}</button><button onClick={confirmDelete} className="flex-1 bg-red-500 text-white py-2.5 rounded-xl hover:bg-red-600 transition-colors shadow-md">{t.confirmDelBtn}</button></div>
              </div>
            </div>
          )}
        </React.Fragment>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(<App />);
  </script>
</body>
</html>
